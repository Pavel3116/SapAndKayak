<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | SUP & Kayak</title>
    <link rel="icon" type="image/x-icon" href="./favicon/Mask groupICO.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #3B79BF 0%, #2A8BF2 50%, #FF8C42 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .login-container {
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            text-align: center;
        }
        
        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 30px;
            text-decoration: none;
            display: block;
        }
        
        .logo span:first-child {
            background: linear-gradient(45deg, #3B79BF, #2A8BF2);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .logo span:last-child {
            background: linear-gradient(45deg, #BA5D39, #FF8C42);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        h2 {
            color: #333;
            margin-bottom: 30px;
            font-size: 1.8rem;
        }
        
        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }
        
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            transition: border 0.3s ease;
        }
        
        input:focus {
            outline: none;
            border-color: #2A8BF2;
            box-shadow: 0 0 0 3px rgba(42, 139, 242, 0.1);
        }
        
        .btn-login {
            background: linear-gradient(45deg, #3b3dbf, #db7807);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: transform 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(42, 139, 242, 0.3);
        }
        
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .demo-users {
            margin-top: 30px;
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            text-align: left;
        }
        
        .demo-users h3 {
            margin-bottom: 15px;
            color: #333;
        }
        
        .user-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #2A8BF2;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        
        .user-card:hover {
            transform: translateX(5px);
        }
        
        .user-card strong {
            color: #2A8BF2;
        }
        
        .error-message {
            color: #dc3545;
            margin-top: 15px;
            padding: 10px;
            background-color: #f8d7da;
            border-radius: 5px;
            display: none;
        }
        
        .success-message {
            color: #28a745;
            margin-top: 15px;
            padding: 10px;
            background-color: #d4edda;
            border-radius: 5px;
            display: none;
        }
        
        .register-link {
            margin-top: 20px;
            color: #666;
        }
        
        .register-link a {
            color: #2A8BF2;
            text-decoration: none;
            font-weight: bold;
        }
        
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .btn-text {
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <a href="first.html" class="logo">
            <span>SUP</span>
            <span style="color: #396fd4;">&</span>
            <span>Kayak</span>
        </a>
        
        <h2>Вход в личный кабинет</h2>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Имя пользователя или Email</label>
                <input type="text" id="username" name="username" placeholder="ваше_имя или ваш@email.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            
            <div class="error-message" id="errorMessage">
                Неверные данные для входа
            </div>
            
            <div class="success-message" id="successMessage">
                Вход выполнен успешно! Перенаправление...
            </div>
            
            <button type="submit" class="btn-login" id="submitBtn">
                <div class="loader" id="loader" style="display: none;"></div>
                <span class="btn-text" id="btnText">Войти</span>
            </button>
        </form>
        
        <div class="demo-users">
            <h3>Тестовые пользователи:</h3>
            <div class="user-card" onclick="fillDemoUser('admin', 'admin123')">
                <strong>Администратор</strong><br>
                Логин: admin<br>
                Пароль: admin123
            </div>
            <div class="user-card" onclick="fillDemoUser('testuser', 'Password123')">
                <strong>Тестовый пользователь</strong><br>
                Логин: testuser<br>
                Пароль: Password123
            </div>
        </div>
        
        <div class="register-link">
            Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
        </div>
    </div>

    <script>
        // API базовый URL
        const API_URL = 'http://127.0.0.1:8000/api/users/';
        
        // Проверяем, авторизован ли пользователь
        if (localStorage.getItem('auth_token')) {
            // Если уже авторизован, перенаправляем в ЛК
            window.location.href = 'dashboard.html';
        }
        
        function fillDemoUser(username, password) {
            document.getElementById('username').value = username;
            document.getElementById('password').value = password;
        }
        
        // Отправка формы входа
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            
            // Скрываем сообщения
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            
            // Показываем загрузку
            submitBtn.disabled = true;
            loader.style.display = 'inline-block';
            btnText.textContent = 'Вход...';
            
            try {
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                
                // Отправляем запрос на вход
                const response = await fetch(API_URL + 'login/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Успешный вход
                    console.log('Успешный вход:', data);
                    
                    // Сохраняем токен и данные пользователя
                    localStorage.setItem('auth_token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    localStorage.setItem('isLoggedIn', 'true');
                    
                    // Показываем успешное сообщение
                    successMessage.style.display = 'block';
                    successMessage.textContent = 'Вход выполнен успешно! Перенаправление...';
                    
                    // Перенаправляем через 1.5 секунды
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                    
                } else {
                    // Ошибка входа
                    errorMessage.style.display = 'block';
                    errorMessage.textContent = data.error || 'Неверное имя пользователя или пароль';
                    
                    throw new Error(data.error || 'Ошибка входа');
                }
                
            } catch (error) {
                console.error('Ошибка входа:', error);
                errorMessage.style.display = 'block';
                errorMessage.textContent = 'Ошибка подключения к серверу. Проверьте API.';
            } finally {
                // Скрываем загрузку
                submitBtn.disabled = false;
                loader.style.display = 'none';
                btnText.textContent = 'Войти';
            }
        });
        
        // Функция для проверки токена (опционально)
        async function checkToken() {
            const token = localStorage.getItem('auth_token');
            if (!token) return false;
            
            try {
                const response = await fetch(API_URL + 'profile/', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Token ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                return response.ok;
            } catch (error) {
                return false;
            }
        }
        
        // Для быстрого тестирования - автозаполнение
        // fillDemoUser('testuser', 'Password123');
    </script>
</body>
</html>
